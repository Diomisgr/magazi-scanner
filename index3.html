<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIM DIOMIS SCANNER</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { background-color: #70dcdb; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); width: 100%; max-width: 400px; box-sizing: border-box; border: 3px solid #333; }
        h1 { color: #333; font-size: 22px; margin-bottom: 20px; font-weight: 900; }
        
        #btnPaste { 
            background-color: #2ecc71; color: white; padding: 25px; border: none; border-radius: 12px; 
            font-size: 20px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 20px;
            box-shadow: 0 6px #27ae60; text-transform: uppercase;
        }
        #btnPaste:active { box-shadow: 0 2px #27ae60; transform: translateY(4px); }

        input { width: 100%; padding: 15px; font-size: 24px; border: 3px solid #333; border-radius: 10px; text-align: center; margin-bottom: 20px; box-sizing: border-box; font-weight: bold; background: #eee; }
        
        #barcodeContainer { background: white; padding: 20px; border-radius: 10px; min-height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #ccc; }
        #barcode { width: 100%; max-width: 300px; }
        
        .instructions { font-size: 14px; color: #333; margin-top: 20px; text-align: left; background: #fdf2e9; padding: 15px; border-radius: 10px; border-left: 5px solid #e67e22; }
        .footer { margin-top: auto; padding: 20px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>JIM DIOMIS SCANNER</h1>
        
        <button id="btnPaste" onclick="pasteAndFilter()">📋 ΕΠΙΚΟΛΛΗΣΗ ΚΩΔΙΚΟΥ RF</button>

        <input type="text" id="inputBox" placeholder="ΠΕΡΙΜΕΝΩ..." oninput="generateBarcode()">

        <div id="barcodeContainer">
            <svg id="barcode"></svg>
        </div>

        <div class="instructions">
            <b>ΓΡΗΓΟΡΑ ΒΗΜΑΤΑ:</b><br>
            1. <b>Google Lens</b> στο κινητό.<br>
            2. Σκανάρεις τον κωδικό & <b>Αντιγραφή</b>.<br>
            3. Έρχεσαι εδώ και πατάς <b>ΕΠΙΚΟΛΛΗΣΗ</b>.
        </div>
    </div>

    <div class="footer">DEVELOPED BY JIM DIOMIS</div>

    <script>
        async function pasteAndFilter() {
            try {
                const text = await navigator.clipboard.readText();
                
                // ΜΑΓΙΚΟ ΦΙΛΤΡΟ: Ψάχνει να βρει αν υπάρχει κάπου η λέξη RF ακολουθούμενη από νούμερα
                const rfMatch = text.match(/RF\d+/i); 
                
                let finalCode = "";
                if (rfMatch) {
                    finalCode = rfMatch[0].toUpperCase(); // Βρήκε το RF123456
                } else {
                    finalCode = text.trim().replace(/[\s-]/g, ''); // Αν δεν βρει RF, απλά καθαρίζει τα κενά
                }

                document.getElementById('inputBox').value = finalCode;
                generateBarcode();
                if (navigator.vibrate) navigator.vibrate(100);
            } catch (err) {
                alert("Πάτα Allow (Επιτρέπεται) στην επικόλληση!");
            }
        }

        function generateBarcode() {
            let val = document.getElementById('inputBox').value.trim();
            if (val.length > 2) {
                JsBarcode("#barcode", val, {
                    format: "CODE128",
                    displayValue: true,
                    fontSize: 20,
                    width: 2,
                    height: 80
                });
            }
        }
    </script>
</body>
</html>
