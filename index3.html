<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIM DIOMIS SCANNER</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { background-color: #70dcdb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); max-width: 450px; margin: auto; border: 2px solid #333; }
        
        h1 { color: #333; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #70dcdb; padding-bottom: 10px; }

        /* Κουμπιά */
        .btn { width: 100%; padding: 20px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 12px; color: white; transition: 0.2s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-scan { background-color: #3498db; box-shadow: 0 6px #2980b9; }
        .btn-paste { background-color: #2ecc71; box-shadow: 0 6px #27ae60; }
        .btn-stop { background-color: #e74c3c; box-shadow: 0 6px #c0392b; display: none; }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        input { width: 100%; padding: 18px; font-size: 24px; border: 3px solid #333; border-radius: 12px; text-align: center; margin: 20px 0; font-weight: bold; box-sizing: border-box; background-color: #f0f0f0; color: #222; }
        
        /* Παράθυρο Κάμερας */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 20px; border: 5px solid #333; background: #000; }
        
        #barcodeContainer { background: #fff; padding: 20px; border-radius: 15px; min-height: 110px; display: flex; justify-content: center; align-items: center; border: 1px dashed #999; }
        #barcode { width: 100%; max-width: 320px; height: auto; }
        
        .footer { margin-top: 25px; font-weight: bold; font-size: 13px; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>JIM DIOMIS SCANNER</h1>

        <button id="btnStart" class="btn btn-scan" onclick="startScanning()">📸 ΑΝΟΙΓΜΑ ΚΑΜΕΡΑΣ</button>
        
        <button id="btnStop" class="btn btn-stop" onclick="stopScanning()">❌ ΚΛΕΙΣΙΜΟ ΚΑΜΕΡΑΣ</button>

        <div id="reader"></div>

        <button class="btn btn-paste" onclick="pasteFromClipboard()">📋 ΕΠΙΚΟΛΛΗΣΗ (LENS)</button>

        <input type="text" id="inputBox" placeholder="ΚΩΔΙΚΟΣ..." oninput="generateBarcode()">

        <div id="barcodeContainer">
            <svg id="barcode"></svg>
        </div>
    </div>

    <div class="footer">DEVELOPED BY JIM DIOMIS</div>

    <script>
        let html5QrCode;

        function startScanning() {
            document.getElementById('reader').style.display = 'block';
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnStop').style.display = 'block';

            html5QrCode = new Html5Qrcode("reader");
            
            // Ρυθμίσεις για καλύτερο focus στο Barcode
            const config = { 
                fps: 20, 
                qrbox: { width: 300, height: 150 },
                aspectRatio: 1.0
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    // Μόλις βρει κωδικό
                    let cleanText = decodedText.trim().replace(/[\s-]/g, '');
                    document.getElementById('inputBox').value = cleanText;
                    generateBarcode();
                    stopScanning();
                    if (navigator.vibrate) navigator.vibrate(200);
                }
            ).catch((err) => {
                console.error("Camera Error: ", err);
            });
        }

        function stopScanning() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                    document.getElementById('btnStart').style.display = 'block';
                    document.getElementById('btnStop').style.display = 'none';
                }).catch(err => console.log("Stop error", err));
            }
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                let cleanText = text.trim().replace(/[\s-]/g, '');
                document.getElementById('inputBox').value = cleanText;
                generateBarcode();
                if (navigator.vibrate) navigator.vibrate(150);
            } catch (err) {
                alert("Δεν δόθηκε άδεια για επικόλληση ή το πρόχειρο είναι άδειο.");
            }
        }

        function generateBarcode() {
            let val = document.getElementById('inputBox').value.trim();
            if (val.length > 2) {
                JsBarcode("#barcode", val, {
                    format: "CODE128",
                    displayValue: true,
                    fontSize: 22,
                    fontOptions: "bold",
                    lineColor: "#000",
                    width: 2,
                    height: 90
                });
            } else {
                document.getElementById('barcode').innerHTML = "";
            }
        }
    </script>
</body>
</html>
