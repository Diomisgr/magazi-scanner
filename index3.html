<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIM DIOMIS SCANNER - OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { background-color: #70dcdb; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); max-width: 450px; margin: auto; }
        h1 { color: #333; font-size: 22px; margin-bottom: 20px; text-transform: uppercase; }
        
        .btn { width: 100%; padding: 20px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px; color: white; text-transform: uppercase; }
        .btn-camera { background-color: #3498db; box-shadow: 0 6px #2980b9; }
        .btn-paste { background-color: #2ecc71; box-shadow: 0 6px #27ae60; }
        
        #status { font-size: 14px; color: #e67e22; font-weight: bold; margin-bottom: 10px; min-height: 20px; }
        
        input { width: 100%; padding: 18px; font-size: 24px; border: 3px solid #333; border-radius: 12px; text-align: center; margin: 15px 0; font-weight: bold; box-sizing: border-box; }
        
        #barcodeContainer { background: #fff; padding: 20px; border-radius: 15px; min-height: 110px; display: flex; justify-content: center; align-items: center; border: 1px dashed #999; }
        #barcode { width: 100%; max-width: 320px; }
        
        /* Κρύβουμε το input της κάμερας */
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>JIM DIOMIS SCANNER</h1>

        <div id="status"></div>

        <label for="fileInput" class="btn btn-camera" style="display: block;">📸 ΦΩΤΟΓΡΑΦΙΣΕ ΤΟΝ ΚΩΔΙΚΟ</label>
        <input type="file" id="fileInput" accept="image/*" capture="environment">

        <button class="btn btn-paste" onclick="pasteFromClipboard()">📋 ΕΠΙΚΟΛΛΗΣΗ (LENS)</button>

        <input type="text" id="inputBox" placeholder="ΠΕΡΙΜΕΝΩ ΚΩΔΙΚΟ..." oninput="generateBarcode()">

        <div id="barcodeContainer">
            <svg id="barcode"></svg>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "ΔΙΑΒΑΖΩ ΤΟΝ ΚΩΔΙΚΟ... ΠΕΡΙΜΕΝΕ";
            
            Tesseract.recognize(file, 'eng', { 
                logger: m => console.log(m) 
            }).then(({ data: { text } }) => {
                // Καθαρισμός: Κρατάμε μόνο γράμματα και αριθμούς, βγάζουμε τα άσχετα
                let cleanText = text.replace(/[^a-zA-Z0-9]/g, '').trim();
                document.getElementById('inputBox').value = cleanText;
                generateBarcode();
                status.innerText = "ΕΤΟΙΜΟ!";
                if (navigator.vibrate) navigator.vibrate(200);
            }).catch(err => {
                status.innerText = "ΣΦΑΛΜΑ ΣΤΗΝ ΑΝΑΓΝΩΣΗ";
                console.error(err);
            });
        });

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                let cleanText = text.trim().replace(/[\s-]/g, '');
                document.getElementById('inputBox').value = cleanText;
                generateBarcode();
            } catch (err) {
                alert("Πάτα παρατεταμένα για επικόλληση");
            }
        }

        function generateBarcode() {
            let val = document.getElementById('inputBox').value.trim();
            if (val.length > 1) {
                JsBarcode("#barcode", val, {
                    format: "CODE128",
                    displayValue: true,
                    fontSize: 22,
                    width: 2,
                    height: 90
                });
            }
        }
    </script>
</body>
</html>
