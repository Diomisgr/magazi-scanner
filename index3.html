<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIM DIOMIS SCANNER</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { 
            background-color: #70dcdb; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 100%;
            max-width: 420px; 
            box-sizing: border-box;
            border: 4px solid #333;
        }
        h1 { 
            color: #333; 
            font-size: 24px; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            border-bottom: 3px solid #70dcdb;
            padding-bottom: 10px;
        }
        
        /* ΤΟ ΜΕΓΑΛΟ ΚΟΥΜΠΙ */
        #btnPaste { 
            background-color: #2ecc71; 
            color: white; 
            padding: 25px; 
            border: none; 
            border-radius: 15px; 
            font-size: 20px; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer; 
            margin-bottom: 20px;
            box-shadow: 0 8px #27ae60; 
            text-transform: uppercase;
            transition: 0.1s;
        }
        #btnPaste:active { 
            box-shadow: 0 2px #27ae60; 
            transform: translateY(6px); 
        }

        input { 
            width: 100%; 
            padding: 18px; 
            font-size: 26px; 
            border: 3px solid #333; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
            font-weight: bold; 
            background: #f9f9f9;
        }
        
        #barcodeContainer { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            min-height: 120px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: 1px solid #ccc;
        }
        #barcode { 
            width: 100%; 
            height: auto;
        }
        
        .instructions { 
            font-size: 14px; 
            color: #333; 
            margin-top: 20px; 
            text-align: left; 
            background: #fff8e1; 
            padding: 15px; 
            border-radius: 12px; 
            border-left: 6px solid #ffc107; 
        }
        .footer { 
            margin-top: auto; 
            padding: 20px; 
            font-weight: bold; 
            font-size: 13px; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>JIM DIOMIS SCANNER</h1>
        
        <button id="btnPaste" onclick="pasteAndFilter()">📋 ΕΠΙΚΟΛΛΗΣΗ ΚΩΔΙΚΟΥ</button>

        <input type="text" id="inputBox" placeholder="ΠΕΡΙΜΕΝΩ..." oninput="generateBarcode()">

        <div id="barcodeContainer">
            <svg id="barcode"></svg>
        </div>

        <div class="instructions">
            <b>ΟΔΗΓΙΕΣ:</b><br>
            1. Άνοιξε το <b>Google Lens</b>.<br>
            2. Σκάναρε & πάτα <b>"Αντιγραφή κειμένου"</b>.<br>
            3. Έλα εδώ και πάτα το <b>ΠΡΑΣΙΝΟ ΚΟΥΜΠΙ</b>.
        </div>
    </div>

    <div class="footer">DEVELOPED BY JIM DIOMIS</div>

    <script>
        async function pasteAndFilter() {
            try {
                // 1. Παίρνουμε το κείμενο από το "πρόχειρο" (Clipboard)
                const rawText = await navigator.clipboard.readText();
                
                // 2. Καθαρίζουμε ΟΛΑ τα κενά, παύλες και αλλαγές γραμμής
                // Μετατρέπει το "R F - 123 456" σε "RF123456"
                let cleanText = rawText.replace(/[\s-]/g, ''); 

                // 3. Ψάχνουμε να βρούμε το RF και τα νούμερα που είναι δίπλα του
                const rfMatch = cleanText.match(/RF\d+/i); 
                
                let finalCode = "";
                if (rfMatch) {
                    // Αν βρει RF, κράτα ΜΟΝΟ αυτό
                    finalCode = rfMatch[0].toUpperCase(); 
                } else {
                    // Αν δεν βρει RF (π.χ. είναι άλλος κωδικός), κράτα όλο το καθαρό κείμενο
                    finalCode = cleanText; 
                }

                // 4. Βάζουμε το αποτέλεσμα στο κουτί και φτιάχνουμε το Barcode
                document.getElementById('inputBox').value = finalCode;
                generateBarcode();
                
                // Δόνηση για επιβεβαίωση
                if (navigator.vibrate) navigator.vibrate(100);

            } catch (err) {
                alert("Πρέπει να πατήσεις 'Allow/Να επιτρέπεται' στο μήνυμα για την επικόλληση!");
            }
        }

        function generateBarcode() {
            let val = document.getElementById('inputBox').value.trim();
            if (val.length > 1) {
                JsBarcode("#barcode", val, {
                    format: "CODE128",
                    displayValue: true,
                    fontSize: 22,
                    fontOptions: "bold",
                    width: 2,
                    height: 90,
                    lineColor: "#000"
                });
            } else {
                document.getElementById('barcode').innerHTML = "";
            }
        }
    </script>
</body>
</html>
