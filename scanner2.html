<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCANNER PRO - PHOTO MODE</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { background-color: #70dcdb; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        h2 { color: #333; font-size: 18px; }
        input[type="text"] { width: 100%; padding: 15px; font-size: 22px; border: 2px solid #333; border-radius: 8px; margin: 15px 0; text-align: center; box-sizing: border-box; }
        
        /* Το "μαγικό" κουμπί */
        .upload-btn {
            background-color: #2ecc71; color: white; padding: 20px; border: none; border-radius: 8px;
            font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; display: inline-block;
            box-shadow: 0 5px #27ae60;
        }
        #fileInput { display: none; } /* Κρυφό input */

        #barcodeCanvas { margin-top: 20px; width: 100%; max-width: 300px; }
        .footer { margin-top: 30px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>MAGAZI SCANNER PHOTO</h2>
        
        <input type="text" id="inputBox" placeholder="ΚΩΔΙΚΟΣ ΕΔΩ" oninput="drawBarcode()">

        <label for="fileInput" class="upload-btn">
            📸 ΒΓΑΛΕ ΦΩΤΟ ΤΟΝ ΚΩΔΙΚΟ
        </label>
        <input type="file" id="fileInput" accept="image/*" capture="environment">

        <div id="result">
            <svg id="barcodeCanvas"></svg>
        </div>
    </div>

    <div class="footer">COPYRIGHT BY JIM DIOMIS</div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const codeReader = new ZXing.BrowserMultiFormatReader();

        fileInput.addEventListener('change', e => {
            if (e.target.files.length == 0) return;
            
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function() {
                const img = new Image();
                img.src = reader.result;
                img.onload = function() {
                    // Προσπάθεια ανάγνωσης από τη φωτό
                    codeReader.decodeFromImageElement(img)
                        .then(result => {
                            let cleanCode = result.text.trim().replace(/[\s-]/g, '');
                            document.getElementById('inputBox').value = cleanCode;
                            drawBarcode();
                            if (navigator.vibrate) navigator.vibrate(200);
                        })
                        .catch(err => {
                            alert("Δεν μπόρεσα να διαβάσω τον κώδικα. Ξαναβγάλε μια πιο καθαρή φωτό!");
                        });
                };
            };
            reader.readAsDataURL(file);
        });

        function drawBarcode() {
            let val = document.getElementById('inputBox').value.trim();
            if (val.length > 2) {
                JsBarcode("#barcodeCanvas", val, {
                    format: "CODE128",
                    displayValue: false,
                    lineColor: "#000",
                    width: 2,
                    height: 100
                });
            }
        }
    </script>
</body>
</html>
