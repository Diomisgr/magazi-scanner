<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAGAZI SCANNER - FAST PASTE</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { background-color: #70dcdb; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); width: 100%; max-width: 400px; box-sizing: border-box; }
        h1 { color: #333; font-size: 22px; margin-bottom: 20px; }
        
        /* Το μεγάλο κουμπί επικόλλησης */
        #btnPaste { 
            background-color: #2ecc71; color: white; padding: 25px; border: none; border-radius: 12px; 
            font-size: 20px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 20px;
            box-shadow: 0 6px #27ae60; text-transform: uppercase;
        }
        #btnPaste:active { box-shadow: 0 2px #27ae60; transform: translateY(4px); }

        input { width: 100%; padding: 15px; font-size: 22px; border: 3px solid #333; border-radius: 10px; text-align: center; margin-bottom: 20px; box-sizing: border-box; font-weight: bold; }
        
        #barcodeContainer { background: #f9f9f9; padding: 20px; border-radius: 10px; min-height: 100px; display: flex; justify-content: center; align-items: center; }
        #barcode { width: 100%; max-width: 300px; }

        .instructions { font-size: 14px; color: #555; margin-top: 20px; text-align: left; background: #e8f8f5; padding: 15px; border-radius: 10px; border-left: 5px solid #2ecc71; }
        .copyright { margin-top: auto; padding: 20px; font-weight: bold; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="card">
        <h1>MAGAZI SCANNER</h1>
        
        <button id="btnPaste" onclick="pasteFromClipboard()">📋 ΕΠΙΚΟΛΛΗΣΗ ΚΩΔΙΚΟΥ</button>

        <input type="text" id="inputBox" placeholder="Ή γράψε εδώ..." oninput="generateBarcode()">

        <div id="barcodeContainer">
            <svg id="barcode"></svg>
        </div>

        <div class="instructions">
            <strong>ΟΔΗΓΙΕΣ:</strong><br>
            1. Άνοιξε το <b>Google Lens</b>.<br>
            2. Σκάνναρε & πάτα <b>"Αντιγραφή κειμένου"</b>.<br>
            3. Έλα εδώ και πάτα το πράσινο κουμπί!
        </div>
    </div>

    <div class="copyright">COPYRIGHT BY JIM DIOMIS</div>

    <script>
        // Λειτουργία Επικόλλησης
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                let cleanText = text.trim().replace(/[\s-]/g, ''); // Καθαρίζει κενά και παύλες
                document.getElementById('inputBox').value = cleanText;
                generateBarcode();
                if (navigator.vibrate) navigator.vibrate(100);
            } catch (err) {
                alert("Πάτα παρατεταμένα μέσα στο πλαίσιο και επίλεξε 'Επικόλληση'");
            }
        }

        function generateBarcode() {
            let val = document.getElementById('inputBox').value.trim();
            if (val.length > 2) {
                JsBarcode("#barcode", val, {
                    format: "CODE128",
                    displayValue: true,
                    fontSize: 20,
                    lineColor: "#000",
                    width: 2,
                    height: 80
                });
            } else {
                document.getElementById('barcode').innerHTML = "";
            }
        }
    </script>
</body>
</html>
